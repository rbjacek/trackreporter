  <title>Track Reporter - Track GPS routes with photos</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 1000px;
      position: relative;
      padding-bottom: 60px;
      overflow: hidden;
    }

    .fullscreen-link {
      display: block;
      position: fixed;
      inset: 0;
      text-decoration: none;
      z-index: 99999;
    }

    .cube-container {
      width: 300px;
      height: 666px;
      position: relative;
      z-index: 1000;
      transform-style: preserve-3d;
      animation: rotateFaces 20s infinite linear;
    }

    .face {
      position: absolute;
      width: 300px;
      height: 666px;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      border: 1px solid #333;
    }

    .front { transform: translateZ(150px); background-image: url('tr_routeview.jpg'); }
    .back { transform: rotateY(180deg) translateZ(150px); background-image: url('tr_routeplayback.jpg'); }
    .right { transform: rotateY(90deg) translateZ(150px); background-image: url('tr_photogallery.jpg'); }
    .left { transform: rotateY(-90deg) translateZ(150px); background-image: url('tr_routebrowse.jpg'); }

    @keyframes rotateFaces {
      0% { transform: rotateY(0deg); }
      100% { transform: rotateY(360deg); }
    }

    .scrolling-banner {
      width: 100%;
      overflow: hidden;
      white-space: nowrap;
      background: #000;
      padding: 0.5em 0;
      position: fixed;
      bottom: 80px;
      font-family: "Segoe UI", "Roboto", sans-serif;
      font-size: 2.8vw;
      border-top: 1px solid #fff;
      z-index: 999;
      text-align: center;
    }

    .scroll-text {
      display: inline-block;
      padding-left: 100%;
      animation: scrollText 12s linear infinite, colorFlow 6s linear infinite;
      background: linear-gradient(
        90deg,
        #ff0000,
        #ff9900,
        #ffff00,
        #00ff00,
        #00ccff,
        #9900ff,
        #ff0000
      );
      background-size: 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
    }

    @keyframes scrollText {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    @keyframes colorFlow {
      0% { background-position: 0%; }
      100% { background-position: 300%; }
    }

    .branding {
      position: absolute;
      inset: 0;
      z-index: 10001;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      pointer-events: none;
    }

    .branding .logo {
      position: absolute;
      top: 20px;
      left: 20px;
      height: 50px;
      width: auto;
      background: red;
    }

    .branding .slogan {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.5em;
      font-weight: bold;
      text-shadow: 0 0 6px rgba(0,0,0,0.6);
      text-align: center;
    }

    .branding .website {
      position: absolute;
      right: 20px;
      bottom: 20px;
      font-size: 1em;
      opacity: 0.8;
      text-shadow: 0 0 4px rgba(0,0,0,0.4);
    }

    .google-play-btn {
      position: absolute;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      z-index: 100000;
      pointer-events: auto;
    }

    .google-play-btn img {
      height: 50px;
      transition: transform 0.3s ease;
    }

    .google-play-btn img:hover {
      transform: scale(1.05);
    }

    @media (max-width: 600px) {
      .cube-container,
      .face {
        width: 90vw;
        height: 70vh;
      }

      .scrolling-banner {
        font-size: 5vw;
      }

      .branding .slogan {
        font-size: 1em;
        width: 70%;
      }
    }

    @media (min-width: 768px) {
      .scrolling-banner {
        font-size: 1.2em;
      }
    }
  </style>
</head>

<body>
  <a href="https://play.google.com/store/apps/details?id=com.trackreporter"
     class="fullscreen-link"
     title="Track Reporter in Google Play Store"
     onclick="return gtag_report_conversion('https://trackreporter.com/index.html');"></a>

  <div class="branding">
    <img src="trackreporter1024x1024-transparent.png" alt="Track Reporter Logo" class="logo">
    <div class="slogan">Track & Report Your Trips — Instantly, Offline.</div>
    <div class="website">www.trackreporter.com</div>

    <a href="https://play.google.com/store/apps/details?id=com.trackreporter"
       class="google-play-btn"
       title="Get it on Google Play"
       onclick="return gtag_report_conversion('https://trackreporter.com/index.html');">
      <img src="google-play-badge.png" alt="Get it on Google Play">
    </a>
  </div>

  <div class="cube-container">
    <div class="face front"></div>
    <div class="face back"></div>
    <div class="face right"></div>
    <div class="face left"></div>
  </div>

  <div class="scrolling-banner">
    <div class="scroll-text">Track Reporter Android application -> Click to install now !</div>
  </div>
</body>
</html>
